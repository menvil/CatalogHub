# CodeRabbit — only auto-review release/* and hotfix/* PRs.
# Strategy: auto-review runs only on PRs carrying the "release" or "hotfix" label.
# Labels are applied automatically by .github/workflows/label-review-bot-prs.yml
# when the PR source branch starts with release/ or hotfix/.
# Manual trigger is still available via @coderabbitai review.

language: en

reviews:
  profile: chill
  auto_review:
    enabled: true
    labels:
      - "release"
      - "hotfix"
    drafts: false
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true

chat:
  auto_reply: true

name: CI
run-name: CI · ${{ github.head_ref || github.ref_name }}

on:
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-style:
    name: Code style (Pint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd, mbstring
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-php-8.3-${{ hashFiles('composer.lock') }}

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check code style
        run: composer format:test

  static-analysis:
    name: Static analysis (PHPStan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd, mbstring
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-php-8.3-${{ hashFiles('composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPStan
        run: composer analyse -- --no-progress

  frontend-build:
    name: Frontend build (Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Upload built assets
        uses: actions/upload-artifact@v4
        with:
          name: public-build
          path: public/build
          retention-days: 1

  tests:
    name: Tests (PHPUnit)
    runs-on: ubuntu-latest
    needs: frontend-build
    outputs:
      assertions: ${{ steps.test-results.outputs.assertions }}
      tests: ${{ steps.test-results.outputs.tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd, mbstring, pdo_sqlite
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-php-8.3-${{ hashFiles('composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          name: public-build
          path: public/build

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --force
          touch database/database.sqlite

      - name: Run SQLite migration and seed smoke check
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate:fresh --seed --force

      - name: Run tests
        id: phpunit
        shell: bash
        run: |
          set -o pipefail
          composer test | tee test-output.txt

      - name: Collect test results
        id: test-results
        if: always()
        shell: bash
        run: |
          result="$(grep -E '^\{"tool":"phpunit"' test-output.txt 2>/dev/null | tail -n 1 || true)"
          php -r '
          $result = json_decode($argv[1], true) ?: [];
          file_put_contents(getenv("GITHUB_OUTPUT"), sprintf(
              "tests=%s\nassertions=%s\n",
              $result["tests"] ?? "n/a",
              $result["assertions"] ?? "n/a",
          ), FILE_APPEND);
          ' "$result"

      - name: Upload Laravel logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: laravel-logs
          path: storage/logs
          retention-days: 5

  migrations-mariadb:
    name: Migrations (MariaDB)
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_DATABASE: cataloghub
          MARIADB_USER: cataloghub
          MARIADB_PASSWORD: cataloghub
          MARIADB_ROOT_PASSWORD: cataloghub-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd, mbstring, pdo_mysql
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-php-8.3-${{ hashFiles('composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Run migrations and seed on MariaDB
        env:
          DB_CONNECTION: mariadb
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: cataloghub
          DB_USERNAME: cataloghub
          DB_PASSWORD: cataloghub
        run: php artisan migrate:fresh --seed --force

      - name: Check rollback path (non-blocking)
        continue-on-error: true
        env:
          DB_CONNECTION: mariadb
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: cataloghub
          DB_USERNAME: cataloghub
          DB_PASSWORD: cataloghub
        run: |
          php artisan migrate:reset --force
          php artisan migrate --force

  migrations-postgres:
    name: Migrations (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: cataloghub
          POSTGRES_USER: cataloghub
          POSTGRES_PASSWORD: cataloghub
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U cataloghub -d cataloghub"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd, mbstring, pdo_pgsql
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-php-8.3-${{ hashFiles('composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Run migrations and seed on PostgreSQL
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: cataloghub
          DB_USERNAME: cataloghub
          DB_PASSWORD: cataloghub
        run: php artisan migrate:fresh --seed --force

      - name: Check rollback path (non-blocking)
        continue-on-error: true
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: cataloghub
          DB_USERNAME: cataloghub
          DB_PASSWORD: cataloghub
        run: |
          php artisan migrate:reset --force
          php artisan migrate --force

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd, mbstring
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Audit Composer dependencies
        run: composer audit --locked

      - name: Audit npm dependencies
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high

  ci-summary:
    name: CI results
    if: always()
    runs-on: ubuntu-latest
    needs:
      - code-style
      - static-analysis
      - frontend-build
      - tests
      - migrations-mariadb
      - migrations-postgres
      - dependency-audit
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Publish CI results
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.0.1
        env:
          CODE_STYLE_RESULT: ${{ needs['code-style'].result }}
          STATIC_ANALYSIS_RESULT: ${{ needs['static-analysis'].result }}
          FRONTEND_BUILD_RESULT: ${{ needs['frontend-build'].result }}
          TESTS_RESULT: ${{ needs.tests.result }}
          TEST_COUNT: ${{ needs.tests.outputs.tests }}
          ASSERTION_COUNT: ${{ needs.tests.outputs.assertions }}
          MARIADB_RESULT: ${{ needs['migrations-mariadb'].result }}
          POSTGRES_RESULT: ${{ needs['migrations-postgres'].result }}
          DEPENDENCY_AUDIT_RESULT: ${{ needs['dependency-audit'].result }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- cataloghub-ci-summary -->';
            const icon = (result) => ({
              success: '✅',
              failure: '❌',
              cancelled: '⚪',
              skipped: '➖',
            }[result] ?? '❔');
            const status = (result) => `${icon(result)} ${result}`;
            const onSuccess = (result, successText, fallback = 'See workflow log') =>
              result === 'success' ? successText : fallback;
            const tests = process.env.TEST_COUNT || 'n/a';
            const assertions = process.env.ASSERTION_COUNT || 'n/a';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const lines = [
              marker,
              '## CatalogHub CI',
              '',
              '| Check | Result | Details |',
              '|---|---:|---|',
              `| Code style | ${status(process.env.CODE_STYLE_RESULT)} | ${onSuccess(process.env.CODE_STYLE_RESULT, 'Pint: no changes required')} |`,
              `| Static analysis | ${status(process.env.STATIC_ANALYSIS_RESULT)} | ${onSuccess(process.env.STATIC_ANALYSIS_RESULT, 'PHPStan: 0 errors')} |`,
              `| Frontend build | ${status(process.env.FRONTEND_BUILD_RESULT)} | ${onSuccess(process.env.FRONTEND_BUILD_RESULT, 'Vite production build completed')} |`,
              `| Tests & SQLite | ${status(process.env.TESTS_RESULT)} | ${tests} tests · ${assertions} assertions · migrate:fresh --seed |`,
              `| MariaDB | ${status(process.env.MARIADB_RESULT)} | ${onSuccess(process.env.MARIADB_RESULT, 'Migrations and seed completed')} |`,
              `| PostgreSQL | ${status(process.env.POSTGRES_RESULT)} | ${onSuccess(process.env.POSTGRES_RESULT, 'Migrations and seed completed')} |`,
              `| Dependencies | ${status(process.env.DEPENDENCY_AUDIT_RESULT)} | ${onSuccess(process.env.DEPENDENCY_AUDIT_RESULT, 'Composer: 0 advisories · npm: 0 high/critical vulnerabilities')} |`,
              '',
              `[Open workflow run](${runUrl})`,
            ];
            const body = lines.join('\n');

            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${body.replace(`${marker}\n`, '')}\n`);

            if (context.eventName !== 'pull_request') {
              return;
            }

            const pullRequest = context.payload.pull_request;

            if (pullRequest.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              core.info('Skipping PR comment for an external fork.');
              return;
            }

            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullRequest.number,
                per_page: 100,
              });
              const existing = comments.find((comment) =>
                comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker),
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pullRequest.number,
                  body,
                });
              }
            } catch (error) {
              core.warning(`Could not publish the PR summary: ${error.message}`);
            }

      - name: Verify CI result
        env:
          CODE_STYLE_RESULT: ${{ needs['code-style'].result }}
          STATIC_ANALYSIS_RESULT: ${{ needs['static-analysis'].result }}
          FRONTEND_BUILD_RESULT: ${{ needs['frontend-build'].result }}
          TESTS_RESULT: ${{ needs.tests.result }}
          MARIADB_RESULT: ${{ needs['migrations-mariadb'].result }}
          POSTGRES_RESULT: ${{ needs['migrations-postgres'].result }}
          DEPENDENCY_AUDIT_RESULT: ${{ needs['dependency-audit'].result }}
        run: |
          for result in \
            "$CODE_STYLE_RESULT" \
            "$STATIC_ANALYSIS_RESULT" \
            "$FRONTEND_BUILD_RESULT" \
            "$TESTS_RESULT" \
            "$MARIADB_RESULT" \
            "$POSTGRES_RESULT" \
            "$DEPENDENCY_AUDIT_RESULT"
          do
            if [ "$result" != 'success' ]; then
              echo "At least one CI job did not succeed."
              exit 1
            fi
          done

name: Label review bot PRs

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  label-review-bot-pr:
    if: startsWith(github.event.pull_request.head.ref, 'release/') || startsWith(github.event.pull_request.head.ref, 'hotfix/')
    runs-on: ubuntu-latest
    steps:
      - name: Add review bot label
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.0.1
        with:
          script: |
            const headRef = context.payload.pull_request.head.ref;
            const label = headRef.startsWith('hotfix/') ? 'hotfix' : 'release';
            const colors = {
              release: '0E8A16',
              hotfix: 'B60205',
            };

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: colors[label],
              });
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [label],
            });

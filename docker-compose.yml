services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${DB_DATABASE:-cataloghub}"
      POSTGRES_USER: "${DB_USERNAME:-cataloghub}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-cataloghub}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-cataloghub} -d ${DB_DATABASE:-cataloghub}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
